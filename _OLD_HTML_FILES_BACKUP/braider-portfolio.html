<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Braidly Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/braider-dashboard.css">
    <link rel="stylesheet" href="css/footer-nav.css">
    <link rel="stylesheet" href="css/theme.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="braider-dashboard.html"><img src="assets/images/braidly-logo.svg" alt="Braidly Pro" style="height: 50px; width: auto;"></a>
            <div class="ms-auto"><button class="btn btn-outline-light btn-sm" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button></div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-3 col-lg-2 d-md-block sidebar">
                <div class="position-sticky pt-3">
                    <ul class="nav flex-column">
                        <li class="nav-item"><a class="nav-link" href="braider-dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
                        <li class="nav-item"><a class="nav-link" href="braider-bookings.html"><i class="fas fa-calendar-check"></i> Bookings</a></li>
                        <li class="nav-item"><a class="nav-link" href="braider-schedule.html"><i class="fas fa-clock"></i> Schedule</a></li>
                        <li class="nav-item"><a class="nav-link" href="braider-earnings.html"><i class="fas fa-wallet"></i> Earnings</a></li>
                        <li class="nav-item"><a class="nav-link active" href="braider-portfolio.html"><i class="fas fa-images"></i> Portfolio</a></li>
                        <li class="nav-item"><a class="nav-link" href="braider-reviews.html"><i class="fas fa-star"></i> Reviews</a></li>
                        <li class="nav-item"><a class="nav-link" href="braider-analytics.html"><i class="fas fa-chart-line"></i> Analytics</a></li>
                        <li class="nav-item"><a class="nav-link" href="customer-support.html"><i class="fas fa-headset"></i> Support</a></li>
                    </ul>
                </div>
            </nav>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2"><i class="fas fa-images me-2"></i>My Portfolio</h1>
                    <button class="btn btn-sm btn-primary" data-bs-toggle="modal" data-bs-target="#uploadModal"><i class="fas fa-plus"></i> Add Photos</button>
                </div>

                <div id="loadingSpinner" class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-2">Loading portfolio...</p>
                </div>

                <div id="portfolioGrid" style="display:none;"></div>
            </main>
        </div>
    </div>

    <div class="modal fade" id="uploadModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Upload Photos</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="uploadForm">
                        <div class="mb-3">
                            <label class="form-label">Select Photos</label>
                            <input type="file" class="form-control" id="photoFiles" multiple accept="image/*">
                            <small class="text-muted">You can select multiple photos</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Style Category</label>
                            <select class="form-select" id="styleCategory">
                                <option>Box Braids</option>
                                <option>Knotless Braids</option>
                                <option>Cornrows</option>
                                <option>Twists</option>
                                <option>Other</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Caption (Optional)</label>
                            <textarea class="form-control" id="photoCaption" rows="2" placeholder="Describe your work..."></textarea>
                        </div>
                        <div id="previewContainer" class="mb-3"></div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="uploadBtn" onclick="uploadPhotos()">
                        <i class="fas fa-upload"></i> Upload
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/logout.js"></script>
    <script src="js/offline-mode.js"></script>
    <script src="js/footer-nav.js"></script>
    <script src="js/theme.js"></script>
    <script>
        async function loadPortfolio() {
            try {
                const userData = JSON.parse(localStorage.getItem('userData'));
                if (!userData || !userData.email) { 
                    console.log('No user data found, redirecting to login');
                    window.location.href = 'login.html'; 
                    return; 
                }
                const user = userData;

                const { data: profile } = await supabaseClient.from('profiles').select('id').eq('email', user.email).single();
                if (!profile) return;

                const { data: braiderProfile } = await supabaseClient.from('braider_profiles').select('id').eq('user_id', profile.id).single();
                if (!braiderProfile) return;

                const { data: images, error } = await supabaseClient
                    .from('portfolio_images')
                    .select('*')
                    .eq('braider_id', braiderProfile.id)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                document.getElementById('loadingSpinner').style.display = 'none';
                document.getElementById('portfolioGrid').style.display = 'block';

                const grid = document.getElementById('portfolioGrid');
                if (!images || images.length === 0) {
                    grid.innerHTML = '<div class="alert alert-info">No portfolio images yet. Start uploading your work!</div>';
                    return;
                }

                grid.innerHTML = `<div class="row g-3">${images.map(img => `
                    <div class="col-md-3">
                        <div class="card">
                            <img src="${img.image_url}" class="card-img-top" alt="Portfolio">
                            <div class="card-body">
                                <p class="card-text"><small>${img.caption || 'No caption'}</small></p>
                                <span class="badge bg-primary">${img.style_category || 'Uncategorized'}</span>
                                <button class="btn btn-sm btn-outline-danger float-end" onclick="deleteImage('${img.id}')">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('')}</div>`;
            } catch (error) {
                console.error('Error loading portfolio:', error);
                alert('Failed to load portfolio');
            }
        }

        async function deleteImage(imageId) {
            if (confirm('Delete this image?')) {
                try {
                    const { error } = await supabaseClient.from('portfolio_images').delete().eq('id', imageId);
                    if (error) throw error;
                    loadPortfolio();
                } catch (error) {
                    console.error('Error deleting image:', error);
                    alert('Failed to delete image');
                }
            }
        }

        // Photo file preview
        document.getElementById('photoFiles').addEventListener('change', function(e) {
            const files = e.target.files;
            const previewContainer = document.getElementById('previewContainer');
            previewContainer.innerHTML = '';
            
            if (files.length > 0) {
                previewContainer.innerHTML = '<p class="text-muted mb-2">Preview:</p>';
                Array.from(files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const img = document.createElement('img');
                        img.src = e.target.result;
                        img.style.width = '100px';
                        img.style.height = '100px';
                        img.style.objectFit = 'cover';
                        img.style.margin = '5px';
                        img.style.borderRadius = '5px';
                        previewContainer.appendChild(img);
                    };
                    reader.readAsDataURL(file);
                });
            }
        });

        async function uploadPhotos() {
            const files = document.getElementById('photoFiles').files;
            const category = document.getElementById('styleCategory').value;
            const caption = document.getElementById('photoCaption').value;

            if (files.length === 0) {
                alert('Please select at least one photo');
                return;
            }

            const uploadBtn = document.getElementById('uploadBtn');
            uploadBtn.disabled = true;
            uploadBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading...';

            try {
                const userData = JSON.parse(localStorage.getItem('userData'));
                if (!userData || !userData.email) {
                    alert('Please log in first');
                    window.location.href = 'login.html';
                    return;
                }

                const { data: profile, error: profileError } = await supabaseClient
                    .from('profiles')
                    .select('id')
                    .eq('email', userData.email)
                    .single();

                if (profileError || !profile) {
                    alert('Profile not found. Please log in again.');
                    window.location.href = 'login.html';
                    return;
                }

                const { data: braiderProfile, error: braiderError } = await supabaseClient
                    .from('braider_profiles')
                    .select('id')
                    .eq('user_id', profile.id)
                    .single();

                if (braiderError || !braiderProfile) {
                    alert('Braider profile not found. Please complete your profile setup.');
                    return;
                }

                // For demo purposes, we'll use placeholder URLs
                // In production, you would upload to Supabase Storage
                const uploadPromises = Array.from(files).map(async (file, index) => {
                    // Create a placeholder URL (in production, upload to Supabase Storage)
                    const placeholderUrl = `https://via.placeholder.com/400x400/667eea/ffffff?text=${encodeURIComponent(file.name)}`;
                    
                    return supabaseClient.from('portfolio_images').insert({
                        braider_id: braiderProfile.id,
                        image_url: placeholderUrl,
                        caption: caption || `${category} - ${file.name}`,
                        style_category: category
                    });
                });

                await Promise.all(uploadPromises);
                
                alert(`Successfully uploaded ${files.length} photo(s)!`);
                bootstrap.Modal.getInstance(document.getElementById('uploadModal')).hide();
                document.getElementById('uploadForm').reset();
                document.getElementById('previewContainer').innerHTML = '';
                loadPortfolio();
            } catch (error) {
                console.error('Error uploading photos:', error);
                alert('Failed to upload photos: ' + error.message);
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.innerHTML = '<i class="fas fa-upload"></i> Upload';
            }
        }

        loadPortfolio();
    </script>
</body>
</html>
