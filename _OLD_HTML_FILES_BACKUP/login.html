<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - Braidly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="row g-0 min-vh-100">
            <!-- Left Side - Branding -->
            <div class="col-lg-6 auth-brand">
                <div class="brand-content">
                    <div class="logo-container">
                        <img src="assets/images/WhatsApp Image 2026-02-25 at 3.18.01 AM.jpeg" alt="Braidly" class="auth-logo" style="height: 120px; width: auto; background: transparent !important; mix-blend-mode: multiply; filter: brightness(1.3) contrast(1.2) saturate(1.1);">
                    </div>
                    <p class="lead">Welcome back! Log in to continue</p>
                    <div class="testimonial" id="testimonialCarousel">
                        <p class="quote"></p>
                        <p class="author"></p>
                    </div>
                </div>
            </div>

            <!-- Right Side - Login Form -->
            <div class="col-lg-6 auth-form-container">
                <div class="auth-form">
                    <div class="text-center mb-4">
                        <h2>Welcome Back</h2>
                        <p class="text-muted">Log in to your account</p>
                    </div>



                    <!-- Login Form -->
                    <form id="loginForm" class="needs-validation" novalidate>
                        <div class="mb-3">
                            <label for="loginEmail" class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="loginEmail" required>
                            <div class="invalid-feedback">Please enter your email.</div>
                        </div>

                        <div class="mb-3">
                            <label for="loginPassword" class="form-label">Password</label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="loginPassword" required>
                                <button class="btn btn-outline-secondary" type="button" id="toggleLoginPassword">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            <div class="invalid-feedback">Please enter your password.</div>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="rememberMe">
                                <label class="form-check-label" for="rememberMe">
                                    Remember me
                                </label>
                            </div>
                            <a href="forgot-password.html" class="text-decoration-none">Forgot Password?</a>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 btn-lg mb-3">
                            Log In
                        </button>

                        <div class="divider">
                            <span>OR</span>
                        </div>

                        <!-- Social Login Buttons -->
                        <button type="button" class="btn btn-outline-dark w-100 mb-2 social-btn" onclick="loginWithGoogle()">
                            <i class="fab fa-google me-2"></i> Continue with Google
                        </button>

                        <button type="button" class="btn btn-outline-dark w-100 mb-3 social-btn" onclick="loginWithApple()">
                            <i class="fab fa-apple me-2"></i> Continue with Apple
                        </button>

                        <div class="text-center mt-4">
                            <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth-core.js"></script>
    <script>
        // Redirect if already logged in
        window.redirectIfLoggedIn();

        // Handle login
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            const submitBtn = this.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Logging in...';

            const result = await window.braidlyLogin(email, password);
            
            if (result.success) {
                const role = result.user.role;
                if (role === 'admin') {
                    window.location.replace('admin-dashboard.html');
                } else if (role === 'braider') {
                    window.location.replace('braider-dashboard.html');
                } else {
                    window.location.replace('customer-dashboard.html');
                }
            } else {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Log In';
                alert(result.error || 'Login failed');
            }
        });

        // Password toggle
        document.getElementById('toggleLoginPassword').addEventListener('click', function() {
            const password = document.getElementById('loginPassword');
            const icon = this.querySelector('i');
            if (password.type === 'password') {
                password.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                password.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });
    </script>
    <script>
        // Rotating Testimonials and Quotes
        const testimonials = [
            {
                quote: "Braidly made it so easy to find a professional braider. The escrow payment system gave me peace of mind!",
                author: "Sarah J., Customer"
            },
            {
                quote: "I've grown my braiding business 3x since joining Braidly. The platform is amazing!",
                author: "Tasha W., Professional Braider"
            },
            {
                quote: "Finally, a platform that protects both customers and braiders. Love the verification system!",
                author: "Maya L., Customer"
            },
            {
                quote: "Your crown is your glory. Wear it with confidence.",
                author: "Inspiring Quote"
            },
            {
                quote: "Booking appointments has never been easier. The app is so user-friendly!",
                author: "Jessica M., Customer"
            },
            {
                quote: "Beauty begins the moment you decide to be yourself.",
                author: "Inspiring Quote"
            },
            {
                quote: "As a braider, Braidly helps me reach more clients and manage my schedule effortlessly.",
                author: "Keisha R., Professional Braider"
            },
            {
                quote: "Invest in your hair. It's the crown you never take off.",
                author: "Inspiring Quote"
            },
            {
                quote: "The quality of braiders on this platform is outstanding. Highly recommend!",
                author: "Aisha K., Customer"
            },
            {
                quote: "Confidence is the best accessory. Rock it and own it.",
                author: "Inspiring Quote"
            }
        ];

        let currentTestimonialIndex = 0;

        function updateTestimonial() {
            const testimonialElement = document.getElementById('testimonialCarousel');
            if (!testimonialElement) return;

            const quoteElement = testimonialElement.querySelector('.quote');
            const authorElement = testimonialElement.querySelector('.author');

            // Fade out
            testimonialElement.style.opacity = '0';
            testimonialElement.style.transform = 'translateY(20px)';

            setTimeout(() => {
                // Update content
                currentTestimonialIndex = (currentTestimonialIndex + 1) % testimonials.length;
                const current = testimonials[currentTestimonialIndex];
                
                quoteElement.textContent = `"${current.quote}"`;
                authorElement.textContent = `- ${current.author}`;

                // Fade in
                testimonialElement.style.opacity = '1';
                testimonialElement.style.transform = 'translateY(0)';
            }, 500);
        }

        // Initialize first testimonial
        window.addEventListener('load', () => {
            updateTestimonial();
            // Rotate every 5 seconds
            setInterval(updateTestimonial, 5000);
        });

        // Google Login
        async function loginWithGoogle() {
            if (!window.supabaseClient) {
                alert('Supabase not configured. Please set up your Supabase credentials in js/supabase-config.js');
                return;
            }
            
            try {
                const { data, error } = await supabaseClient.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: window.location.origin + '/splash.html'
                    }
                });
                
                if (error) throw error;
            } catch (error) {
                console.error('Google login error:', error);
                alert('Google login error: ' + error.message + '\n\nPlease enable Google provider in Supabase Dashboard → Authentication → Providers');
            }
        }

        // Apple Login
        async function loginWithApple() {
            if (!window.supabaseClient) {
                alert('Supabase not configured. Please set up your Supabase credentials in js/supabase-config.js');
                return;
            }
            
            try {
                const { data, error } = await supabaseClient.auth.signInWithOAuth({
                    provider: 'apple',
                    options: {
                        redirectTo: window.location.origin + '/splash.html'
                    }
                });
                
                if (error) throw error;
            } catch (error) {
                console.error('Apple login error:', error);
                alert('Apple login error: ' + error.message + '\n\nPlease enable Apple provider in Supabase Dashboard → Authentication → Providers');
            }
        }
    </script>
</body>
</html>
