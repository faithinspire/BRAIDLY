<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Styles - Braidly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/theme.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="customer-dashboard.html"><img src="assets/images/braidly-logo.svg" alt="Braidly" style="height: 40px; width: auto;"> Braidly</a>
            <div class="ms-auto">
                <button class="btn btn-outline-light btn-sm" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-3 col-lg-2 d-md-block sidebar">
                <div class="position-sticky pt-3">
                    <ul class="nav flex-column">
                        <li class="nav-item"><a class="nav-link" href="customer-dashboard.html"><i class="fas fa-home"></i> Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="customer-bookings.html"><i class="fas fa-calendar-alt"></i> My Bookings</a></li>
                        <li class="nav-item"><a class="nav-link" href="customer-favorites.html"><i class="fas fa-heart"></i> Favorites</a></li>
                        <li class="nav-item"><a class="nav-link" href="customer-history.html"><i class="fas fa-history"></i> History</a></li>
                        <li class="nav-item"><a class="nav-link" href="customer-wallet.html"><i class="fas fa-wallet"></i> Wallet</a></li>
                        <li class="nav-item"><a class="nav-link" href="customer-referrals.html"><i class="fas fa-gift"></i> Referrals</a></li>
                        <li class="nav-item"><a class="nav-link" href="customer-support.html"><i class="fas fa-headset"></i> Support</a></li>
                    </ul>
                </div>
            </nav>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2"><i class="fas fa-palette me-2"></i><span id="styleTitle">All Styles</span></h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <button class="btn btn-sm btn-outline-primary" onclick="window.history.back()">
                            <i class="fas fa-arrow-left"></i> Back
                        </button>
                    </div>
                </div>

                <div class="row mb-4">
                    <div class="col-md-3">
                        <select class="form-select" id="styleFilter" onchange="filterByStyle()">
                            <option value="all">All Styles</option>
                            <option value="box-braids">Box Braids</option>
                            <option value="knotless">Knotless Braids</option>
                            <option value="kids">Kids Braids</option>
                            <option value="cornrows">Cornrows</option>
                            <option value="twists">Twists</option>
                            <option value="locs">Locs</option>
                            <option value="crochet">Crochet</option>
                            <option value="weave">Weave</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <select class="form-select" id="priceFilter" onchange="filterByPrice()">
                            <option value="all">All Prices</option>
                            <option value="0-100">Under $100</option>
                            <option value="100-150">$100 - $150</option>
                            <option value="150-200">$150 - $200</option>
                            <option value="200+">$200+</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <input type="text" class="form-control" id="searchInput" placeholder="Search braiders..." onkeyup="searchBraiders()">
                    </div>
                </div>

                <div id="loadingSpinner" class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-2">Loading styles...</p>
                </div>

                <div id="stylesGrid" style="display:none;">
                    <div class="row g-4" id="braidersContainer"></div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/logout.js"></script>
    <script src="js/theme.js"></script>
    <script>
        let allBraiders = [];
        let currentStyle = 'all';

        // Get style from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const styleParam = urlParams.get('style');
        if (styleParam) {
            currentStyle = styleParam;
            document.getElementById('styleFilter').value = styleParam;
            document.getElementById('styleTitle').textContent = formatStyleName(styleParam);
        }

        async function loadBraiders() {
            try {
                const { data: braiders, error } = await supabaseClient
                    .from('braider_profiles')
                    .select(`
                        *,
                        profiles:user_id (full_name, avatar_url, email),
                        services (*)
                    `)
                    .eq('is_active', true)
                    .order('rating', { ascending: false });

                if (error) throw error;

                allBraiders = braiders || [];
                document.getElementById('loadingSpinner').style.display = 'none';
                document.getElementById('stylesGrid').style.display = 'block';
                displayBraiders(allBraiders);
            } catch (error) {
                console.error('Error loading braiders:', error);
                document.getElementById('loadingSpinner').innerHTML = '<div class="alert alert-danger">Failed to load braiders</div>';
            }
        }

        function displayBraiders(braiders) {
            const container = document.getElementById('braidersContainer');
            
            if (braiders.length === 0) {
                container.innerHTML = '<div class="col-12"><div class="alert alert-info">No braiders found for this style</div></div>';
                return;
            }

            container.innerHTML = braiders.map(braider => {
                const services = braider.services || [];
                const minPrice = services.length > 0 ? Math.min(...services.map(s => s.price)) : 0;
                
                return `
                    <div class="col-md-6 col-lg-4">
                        <div class="card h-100">
                            <div class="position-relative">
                                <img src="${braider.profiles?.avatar_url || 'assets/images/default-avatar.jpg'}" 
                                     class="card-img-top" alt="${braider.profiles?.full_name}" style="height: 250px; object-fit: cover;">
                                <span class="position-absolute top-0 end-0 m-2 badge bg-${getVerificationBadge(braider.verification_status)}">
                                    ${braider.verification_status}
                                </span>
                            </div>
                            <div class="card-body">
                                <h5 class="card-title">${braider.business_name || braider.profiles?.full_name || 'Braider'}</h5>
                                <div class="mb-2">
                                    <i class="fas fa-star text-warning"></i>
                                    <span>${braider.rating || '0.0'}</span>
                                    <span class="text-muted">(${braider.total_reviews || 0} reviews)</span>
                                </div>
                                <p class="card-text">
                                    <i class="fas fa-map-marker-alt me-1"></i>
                                    ${braider.city || 'N/A'}, ${braider.state || 'N/A'}
                                </p>
                                <p class="card-text">
                                    <i class="fas fa-dollar-sign me-1"></i>
                                    From $${minPrice.toFixed(2)}
                                </p>
                                <div class="d-flex gap-2 mb-2">
                                    ${braider.mobile_service ? '<span class="badge bg-success">Mobile</span>' : ''}
                                    ${braider.salon_service ? '<span class="badge bg-info">Salon</span>' : ''}
                                </div>
                                <button class="btn btn-primary w-100" onclick="viewBraider('${braider.id}')">
                                    View Profile
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getVerificationBadge(status) {
            const badges = { unverified: 'secondary', tier1: 'info', tier2: 'success', pro: 'warning' };
            return badges[status] || 'secondary';
        }

        function formatStyleName(style) {
            return style.split('-').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
        }

        function filterByStyle() {
            const style = document.getElementById('styleFilter').value;
            currentStyle = style;
            document.getElementById('styleTitle').textContent = style === 'all' ? 'All Styles' : formatStyleName(style);
            applyFilters();
        }

        function filterByPrice() {
            applyFilters();
        }

        function searchBraiders() {
            applyFilters();
        }

        function applyFilters() {
            const style = document.getElementById('styleFilter').value;
            const priceRange = document.getElementById('priceFilter').value;
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();

            let filtered = allBraiders;

            // Filter by search term
            if (searchTerm) {
                filtered = filtered.filter(b => 
                    (b.business_name || '').toLowerCase().includes(searchTerm) ||
                    (b.profiles?.full_name || '').toLowerCase().includes(searchTerm) ||
                    (b.city || '').toLowerCase().includes(searchTerm)
                );
            }

            // Filter by price
            if (priceRange !== 'all') {
                filtered = filtered.filter(b => {
                    const services = b.services || [];
                    if (services.length === 0) return false;
                    const minPrice = Math.min(...services.map(s => s.price));
                    
                    if (priceRange === '0-100') return minPrice < 100;
                    if (priceRange === '100-150') return minPrice >= 100 && minPrice < 150;
                    if (priceRange === '150-200') return minPrice >= 150 && minPrice < 200;
                    if (priceRange === '200+') return minPrice >= 200;
                    return true;
                });
            }

            displayBraiders(filtered);
        }

        function viewBraider(braiderId) {
            window.location.href = `braider-profile.html?id=${braiderId}`;
        }

        loadBraiders();
    </script>
</body>
</html>
