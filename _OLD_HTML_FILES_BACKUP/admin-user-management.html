<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - Braidly Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/admin-dashboard.css">
    <link rel="stylesheet" href="css/footer-nav.css">
    <link rel="stylesheet" href="css/theme.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="admin-dashboard.html"><i class="fas fa-shield-alt"></i> Braidly Admin</a>
            <div class="ms-auto">
                <button class="btn btn-outline-light btn-sm" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-3 col-lg-2 d-md-block sidebar">
                <div class="position-sticky pt-3">
                    <ul class="nav flex-column">
                        <li class="nav-item"><a class="nav-link" href="admin-dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
                        <li class="nav-item"><a class="nav-link active" href="admin-user-management.html"><i class="fas fa-users"></i> User Management</a></li>
                        <li class="nav-item"><a class="nav-link" href="admin-verification.html"><i class="fas fa-id-card"></i> Verification Queue</a></li>
                        <li class="nav-item"><a class="nav-link" href="admin-background-checks.html"><i class="fas fa-user-shield"></i> Background Checks</a></li>
                        <li class="nav-item"><a class="nav-link" href="admin-disputes.html"><i class="fas fa-gavel"></i> Dispute Center</a></li>
                        <li class="nav-item"><a class="nav-link" href="admin-fraud.html"><i class="fas fa-exclamation-triangle"></i> Fraud Alerts</a></li>
                        <li class="nav-item"><a class="nav-link" href="admin-financial.html"><i class="fas fa-chart-bar"></i> Financial Overview</a></li>
                        <li class="nav-item"><a class="nav-link" href="admin-badges.html"><i class="fas fa-award"></i> Badge Management</a></li>
                        <li class="nav-item"><a class="nav-link" href="admin-referrals.html"><i class="fas fa-share-alt"></i> Referral Tracking</a></li>
                        <li class="nav-item"><a class="nav-link" href="admin-analytics.html"><i class="fas fa-chart-line"></i> Analytics</a></li>
                    </ul>
                </div>
            </nav>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2"><i class="fas fa-users me-2"></i>User Management</h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <button class="btn btn-sm btn-primary" onclick="refreshUsers()"><i class="fas fa-sync-alt"></i> Refresh</button>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-3">
                        <select class="form-select" id="roleFilter">
                            <option value="">All Roles</option>
                            <option value="customer">Customers</option>
                            <option value="braider">Braiders</option>
                            <option value="admin">Admins</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <input type="text" class="form-control" id="searchUsers" placeholder="Search by name or email...">
                    </div>
                </div>

                <div id="loadingSpinner" class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-2">Loading users...</p>
                </div>

                <div id="usersTable" style="display:none;">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>User</th>
                                    <th>Email</th>
                                    <th>Role</th>
                                    <th>Status</th>
                                    <th>Joined</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="usersTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/logout.js"></script>
    <script src="js/offline-mode.js"></script>
    <script src="js/footer-nav.js"></script>
    <script src="js/theme.js"></script>
    <script>
        async function loadUsers() {
            try {
                const { data: users, error } = await supabaseClient
                    .from('profiles')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                document.getElementById('loadingSpinner').style.display = 'none';
                document.getElementById('usersTable').style.display = 'block';

                const tbody = document.getElementById('usersTableBody');
                tbody.innerHTML = users.map(user => `
                    <tr>
                        <td>
                            <div class="d-flex align-items-center">
                                <img src="${user.avatar_url || 'assets/images/default-avatar.jpg'}" 
                                     class="rounded-circle me-2" width="40" height="40">
                                <strong>${user.full_name || 'N/A'}</strong>
                            </div>
                        </td>
                        <td>${user.email}</td>
                        <td><span class="badge bg-${getRoleBadge(user.role)}">${user.role}</span></td>
                        <td><span class="badge bg-success">Active</span></td>
                        <td>${new Date(user.created_at).toLocaleDateString()}</td>
                        <td>
                            <button class="btn btn-sm btn-outline-primary" onclick="viewUser('${user.id}')">
                                <i class="fas fa-eye"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-danger" onclick="suspendUser('${user.id}')">
                                <i class="fas fa-ban"></i>
                            </button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Error loading users:', error);
                document.getElementById('loadingSpinner').style.display = 'none';
                document.getElementById('usersTable').style.display = 'block';
                
                let errorMessage = 'Failed to load users. ';
                if (error.message && (error.message.includes('column') || error.message.includes('relation'))) {
                    errorMessage += '<br><br><strong>Database Setup Required:</strong><br>';
                    errorMessage += 'Run <code>supabase/schema-fixed.sql</code> in Supabase SQL Editor.<br>';
                    errorMessage += 'See <code>FIX_DATABASE_ERRORS.md</code> for instructions.';
                } else {
                    errorMessage += '<br><br>Error: ' + error.message;
                }
                
                document.querySelector('#usersTable tbody').innerHTML = `
                    <tr>
                        <td colspan="6">
                            <div class="alert alert-danger mb-0">
                                <h5><i class="fas fa-exclamation-triangle"></i> Error</h5>
                                <p>${errorMessage}</p>
                                <button class="btn btn-primary btn-sm mt-2" onclick="loadUsers()">
                                    <i class="fas fa-sync-alt"></i> Try Again
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            }
        }

        function getRoleBadge(role) {
            const badges = { customer: 'info', braider: 'success', admin: 'danger' };
            return badges[role] || 'secondary';
        }

        function refreshUsers() {
            document.getElementById('loadingSpinner').style.display = 'block';
            document.getElementById('usersTable').style.display = 'none';
            loadUsers();
        }

        function viewUser(userId) {
            alert('View user details: ' + userId);
        }

        function suspendUser(userId) {
            if (confirm('Are you sure you want to suspend this user?')) {
                alert('User suspended: ' + userId);
            }
        }

        document.getElementById('roleFilter').addEventListener('change', (e) => {
            const role = e.target.value;
            // Filter logic here
        });

        document.getElementById('searchUsers').addEventListener('input', (e) => {
            const search = e.target.value.toLowerCase();
            // Search logic here
        });

        loadUsers();
    </script>
</body>
</html>
