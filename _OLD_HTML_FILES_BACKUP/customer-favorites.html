<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favorites - Braidly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/footer-nav.css">
    <link rel="stylesheet" href="css/theme.css">
    <style>
        body { padding-bottom: 80px; }
        .sidebar { display: none !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="customer-dashboard.html">
                <img src="assets/images/WhatsApp Image 2026-02-25 at 3.18.01 AM.jpeg" alt="Braidly" style="height: 50px; width: auto; filter: brightness(1.2) contrast(1.1);">
            </a>
            <div class="ms-auto d-flex align-items-center gap-3">
                <button id="theme-toggle" class="btn btn-link text-white" title="Toggle Theme">
                    <i class="fas fa-moon" id="theme-icon"></i>
                </button>
                <button class="btn btn-outline-light btn-sm" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>
    </nav>

    <div class="container py-4">
            <main>
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2"><i class="fas fa-heart me-2"></i>Favorite Braiders</h1>
                    <button class="btn btn-sm btn-primary" onclick="refreshFavorites()"><i class="fas fa-sync-alt"></i> Refresh</button>
                </div>

                <div id="loadingSpinner" class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-2">Loading favorites...</p>
                </div>

                <div id="favoritesList" style="display:none;"></div>
            </main>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="customer-dashboard.html" class="nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="customer-bookings.html" class="nav-item">
            <i class="fas fa-calendar"></i>
            <span>Bookings</span>
        </a>
        <a href="customer-favorites.html" class="nav-item active">
            <i class="fas fa-heart"></i>
            <span>Favorites</span>
        </a>
        <a href="customer-history.html" class="nav-item">
            <i class="fas fa-history"></i>
            <span>History</span>
        </a>
        <a href="profile-settings.html" class="nav-item">
            <i class="fas fa-user"></i>
            <span>Profile</span>
        </a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth-core.js"></script>
    <script>window.protectPage();</script>
    <script src="js/theme.js"></script>
    <script src="js/ai-chatbot.js"></script>
    <script>
        // Logout handler
        document.getElementById('logoutBtn')?.addEventListener('click', function(e) {
            e.preventDefault();
            if (confirm('Logout?')) window.braidlyLogout();
        });
    </script>
    <script>
        async function loadFavorites() {
            try {
                const userData = JSON.parse(localStorage.getItem('userData'));
                if (!userData || !userData.email) { 
                    console.log('No user data found, redirecting to login');
                    window.location.href = 'login.html'; 
                    return; 
                }
                const user = userData;

                const { data: profile } = await supabaseClient.from('profiles').select('id').eq('email', user.email).single();
                if (!profile) return;

                const { data: favorites, error } = await supabaseClient
                    .from('favorites')
                    .select(`
                        *,
                        braider_profiles (
                            *,
                            profiles:user_id (full_name, avatar_url)
                        )
                    `)
                    .eq('customer_id', profile.id);

                if (error) throw error;

                document.getElementById('loadingSpinner').style.display = 'none';
                document.getElementById('favoritesList').style.display = 'block';

                const list = document.getElementById('favoritesList');
                if (!favorites || favorites.length === 0) {
                    list.innerHTML = '<div class="alert alert-info">No favorite braiders yet. Start exploring!</div>';
                    return;
                }

                list.innerHTML = `<div class="row g-4">${favorites.map(fav => `
                    <div class="col-md-4">
                        <div class="card">
                            <img src="${fav.braider_profiles?.profiles?.avatar_url || 'assets/images/default-avatar.jpg'}" 
                                 class="card-img-top" alt="Braider">
                            <div class="card-body">
                                <h5 class="card-title">${fav.braider_profiles?.profiles?.full_name || 'Braider'}</h5>
                                <p class="card-text">
                                    <i class="fas fa-star text-warning"></i> ${fav.braider_profiles?.rating || '0.0'}
                                    <span class="text-muted">(${fav.braider_profiles?.total_reviews || 0} reviews)</span>
                                </p>
                                <p class="card-text"><i class="fas fa-map-marker-alt me-2"></i>${fav.braider_profiles?.city || 'N/A'}</p>
                                <button class="btn btn-primary btn-sm w-100 mb-2">Book Now</button>
                                <button class="btn btn-outline-danger btn-sm w-100" onclick="removeFavorite('${fav.id}')">
                                    <i class="fas fa-heart-broken"></i> Remove
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('')}</div>`;
            } catch (error) {
                console.error('Error loading favorites:', error);
                alert('Failed to load favorites');
            }
        }

        async function removeFavorite(favoriteId) {
            if (confirm('Remove from favorites?')) {
                try {
                    const { error } = await supabaseClient.from('favorites').delete().eq('id', favoriteId);
                    if (error) throw error;
                    refreshFavorites();
                } catch (error) {
                    console.error('Error removing favorite:', error);
                    alert('Failed to remove favorite');
                }
            }
        }

        function refreshFavorites() {
            document.getElementById('loadingSpinner').style.display = 'block';
            document.getElementById('favoritesList').style.display = 'none';
            loadFavorites();
        }

        loadFavorites();
    </script>
</body>
</html>
