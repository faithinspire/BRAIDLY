<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet - Braidly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/footer-nav.css">
    <link rel="stylesheet" href="css/theme.css">
    <style>
        body { padding-bottom: 80px; }
        .sidebar { display: none !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="customer-dashboard.html">
                <img src="assets/images/WhatsApp Image 2026-02-25 at 3.18.01 AM.jpeg" alt="Braidly" style="height: 50px; width: auto; filter: brightness(1.2) contrast(1.1);">
            </a>
            <div class="ms-auto d-flex align-items-center gap-3">
                <button id="theme-toggle" class="btn btn-link text-white" title="Toggle Theme">
                    <i class="fas fa-moon" id="theme-icon"></i>
                </button>
                <button class="btn btn-outline-light btn-sm" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>
    </nav>

    <div class="container py-4">
            <main>
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2"><i class="fas fa-wallet me-2"></i>My Wallet</h1>
                </div>

                <div class="row mb-4">
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-body text-center">
                                <h3 class="text-success">$0.00</h3>
                                <p class="mb-0">Available Credits</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-body text-center">
                                <h3 class="text-info">$0.00</h3>
                                <p class="mb-0">Referral Earnings</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card mb-4">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">Payment Methods</h5>
                        <button class="btn btn-sm btn-primary" data-bs-toggle="modal" data-bs-target="#addCardModal">Add Card</button>
                    </div>
                    <div class="card-body">
                        <div id="paymentMethodsList">
                            <div class="alert alert-info">No payment methods saved yet</div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header"><h5 class="mb-0">Transaction History</h5></div>
                    <div class="card-body">
                        <div class="alert alert-info">No transactions yet</div>
                    </div>
                </div>
            </main>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="customer-dashboard.html" class="nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="customer-bookings.html" class="nav-item">
            <i class="fas fa-calendar"></i>
            <span>Bookings</span>
        </a>
        <a href="customer-favorites.html" class="nav-item">
            <i class="fas fa-heart"></i>
            <span>Favorites</span>
        </a>
        <a href="customer-history.html" class="nav-item">
            <i class="fas fa-history"></i>
            <span>History</span>
        </a>
        <a href="profile-settings.html" class="nav-item">
            <i class="fas fa-user"></i>
            <span>Profile</span>
        </a>
    </nav>

    <!-- Add Card Modal -->
    <div class="modal fade" id="addCardModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add Payment Method</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addCardForm">
                        <div class="mb-3">
                            <label class="form-label">Card Number</label>
                            <input type="text" class="form-control" placeholder="1234 5678 9012 3456" maxlength="19" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Expiry Date</label>
                                <input type="text" class="form-control" placeholder="MM/YY" maxlength="5" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">CVV</label>
                                <input type="text" class="form-control" placeholder="123" maxlength="4" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Cardholder Name</label>
                            <input type="text" class="form-control" placeholder="John Doe" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Billing ZIP Code</label>
                            <input type="text" class="form-control" placeholder="12345" maxlength="5" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="saveCard()">Save Card</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth-core.js"></script>
    <script>window.protectPage();</script>
    <script src="js/theme.js"></script>
    <script src="js/ai-chatbot.js"></script>
    <script>
        // Logout handler
        document.getElementById('logoutBtn')?.addEventListener('click', function(e) {
            e.preventDefault();
            if (confirm('Logout?')) window.braidlyLogout();
        });

        function saveCard() {
            alert('Card saved successfully! (In production, this would integrate with Stripe/PayPal)');
            const modal = bootstrap.Modal.getInstance(document.getElementById('addCardModal'));
            modal.hide();
            
            // Update UI to show saved card
            document.getElementById('paymentMethodsList').innerHTML = `
                <div class="d-flex justify-content-between align-items-center p-3 border rounded mb-2">
                    <div>
                        <i class="fab fa-cc-visa fa-2x me-3"></i>
                        <strong>•••• •••• •••• 3456</strong>
                        <span class="text-muted ms-2">Expires 12/25</span>
                    </div>
                    <button class="btn btn-sm btn-outline-danger">Remove</button>
                </div>
            `;
        }
    </script>
