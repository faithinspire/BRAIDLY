<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule - Braidly Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/braider-dashboard.css">
    <link rel="stylesheet" href="css/footer-nav.css">
    <link rel="stylesheet" href="css/theme.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="braider-dashboard.html"><img src="assets/images/braidly-logo.svg" alt="Braidly Pro" style="height: 50px; width: auto;"></a>
            <div class="ms-auto"><button class="btn btn-outline-light btn-sm" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button></div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-3 col-lg-2 d-md-block sidebar">
                <div class="position-sticky pt-3">
                    <ul class="nav flex-column">
                        <li class="nav-item"><a class="nav-link" href="braider-dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
                        <li class="nav-item"><a class="nav-link" href="braider-bookings.html"><i class="fas fa-calendar-check"></i> Bookings</a></li>
                        <li class="nav-item"><a class="nav-link active" href="braider-schedule.html"><i class="fas fa-clock"></i> Schedule</a></li>
                        <li class="nav-item"><a class="nav-link" href="braider-earnings.html"><i class="fas fa-wallet"></i> Earnings</a></li>
                        <li class="nav-item"><a class="nav-link" href="braider-portfolio.html"><i class="fas fa-images"></i> Portfolio</a></li>
                        <li class="nav-item"><a class="nav-link" href="braider-reviews.html"><i class="fas fa-star"></i> Reviews</a></li>
                        <li class="nav-item"><a class="nav-link" href="braider-analytics.html"><i class="fas fa-chart-line"></i> Analytics</a></li>
                        <li class="nav-item"><a class="nav-link" href="customer-support.html"><i class="fas fa-headset"></i> Support</a></li>
                    </ul>
                </div>
            </nav>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2"><i class="fas fa-clock me-2"></i>My Schedule</h1>
                    <button class="btn btn-sm btn-primary"><i class="fas fa-plus"></i> Block Time</button>
                </div>

                <div class="card mb-4">
                    <div class="card-header"><h5 class="mb-0">Working Hours</h5></div>
                    <div class="card-body">
                        <form>
                            <div class="row mb-3">
                                <div class="col-md-4"><label class="form-label">Monday</label></div>
                                <div class="col-md-3"><input type="time" class="form-control" value="09:00"></div>
                                <div class="col-md-3"><input type="time" class="form-control" value="18:00"></div>
                                <div class="col-md-2"><div class="form-check"><input class="form-check-input" type="checkbox" checked><label class="form-check-label">Active</label></div></div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-4"><label class="form-label">Tuesday</label></div>
                                <div class="col-md-3"><input type="time" class="form-control" value="09:00"></div>
                                <div class="col-md-3"><input type="time" class="form-control" value="18:00"></div>
                                <div class="col-md-2"><div class="form-check"><input class="form-check-input" type="checkbox" checked><label class="form-check-label">Active</label></div></div>
                            </div>
                            <button type="submit" class="btn btn-primary">Save Schedule</button>
                        </form>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header"><h5 class="mb-0">Calendar View</h5></div>
                    <div class="card-body">
                        <div class="alert alert-info">Calendar integration coming soon</div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/logout.js"></script>
    <script src="js/offline-mode.js"></script>
    <script src="js/footer-nav.js"></script>
    <script src="js/theme.js"></script>
</body>
</html>
