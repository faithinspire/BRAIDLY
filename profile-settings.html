<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile & Settings - Braidly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/footer-nav.css">
    <link rel="stylesheet" href="css/theme.css">
    <style>
        body {
            padding-bottom: 80px;
        }
        .profile-avatar {
            position: relative;
            display: inline-block;
        }
        .avatar-preview {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #667eea;
        }
        .avatar-placeholder {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 48px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="customer-dashboard.html">
                <img src="assets/images/WhatsApp Image 2026-02-25 at 3.18.01 AM.jpeg" alt="Braidly" style="height: 50px; width: auto; filter: brightness(1.2) contrast(1.1);">
            </a>
            <div class="ms-auto d-flex align-items-center">
                <button id="theme-toggle" class="btn btn-link text-white" title="Toggle Theme">
                    <i class="fas fa-moon" id="theme-icon"></i>
                </button>
                <button class="btn btn-outline-light btn-sm" onclick="goBackToDashboard()">
                    <i class="fas fa-arrow-left me-2"></i>Back to Dashboard
                </button>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <h2 class="mb-4"><i class="fas fa-user-cog me-2"></i>Profile & Settings</h2>

        <!-- Profile Section -->
        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0"><i class="fas fa-user me-2"></i>Personal Information</h5>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-3 text-center mb-3">
                        <div class="profile-avatar mb-3">
                            <div id="avatarPreview" class="avatar-placeholder">
                                <i class="fas fa-user"></i>
                            </div>
                        </div>
                        <input type="file" id="avatarInput" accept="image/*" style="display: none;">
                        <button class="btn btn-sm btn-outline-primary" onclick="document.getElementById('avatarInput').click()">
                            <i class="fas fa-camera me-1"></i>Change Photo
                        </button>
                    </div>
                    <div class="col-md-9">
                        <form id="profileForm">
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Full Name</label>
                                    <input type="text" class="form-control" id="fullName" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Email</label>
                                    <input type="email" class="form-control" id="email" readonly>
                                    <small class="text-muted">Email cannot be changed</small>
                                </div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Phone Number</label>
                                    <input type="tel" class="form-control" id="phone">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Location</label>
                                    <input type="text" class="form-control" id="location" placeholder="City, State">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Bio</label>
                                <textarea class="form-control" id="bio" rows="3" placeholder="Tell us about yourself..."></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-2"></i>Save Changes
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Preferences -->
        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0"><i class="fas fa-sliders-h me-2"></i>Notification Preferences</h5>
            </div>
            <div class="card-body">
                <div class="form-check form-switch mb-3">
                    <input class="form-check-input" type="checkbox" id="emailNotifications" checked>
                    <label class="form-check-label" for="emailNotifications">
                        <strong>Email Notifications</strong>
                        <p class="text-muted mb-0 small">Receive booking confirmations and updates via email</p>
                    </label>
                </div>
                <div class="form-check form-switch mb-3">
                    <input class="form-check-input" type="checkbox" id="smsNotifications" checked>
                    <label class="form-check-label" for="smsNotifications">
                        <strong>SMS Notifications</strong>
                        <p class="text-muted mb-0 small">Get text messages for important updates</p>
                    </label>
                </div>
                <div class="form-check form-switch mb-3">
                    <input class="form-check-input" type="checkbox" id="pushNotifications" checked>
                    <label class="form-check-label" for="pushNotifications">
                        <strong>Push Notifications</strong>
                        <p class="text-muted mb-0 small">Receive browser notifications</p>
                    </label>
                </div>
                <div class="form-check form-switch mb-3">
                    <input class="form-check-input" type="checkbox" id="marketingEmails">
                    <label class="form-check-label" for="marketingEmails">
                        <strong>Marketing Emails</strong>
                        <p class="text-muted mb-0 small">Receive promotional offers and news</p>
                    </label>
                </div>
                <button class="btn btn-primary" onclick="savePreferences()">
                    <i class="fas fa-save me-2"></i>Save Preferences
                </button>
            </div>
        </div>

        <!-- Security -->
        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0"><i class="fas fa-lock me-2"></i>Security</h5>
            </div>
            <div class="card-body">
                <button class="btn btn-outline-primary mb-3" data-bs-toggle="modal" data-bs-target="#changePasswordModal">
                    <i class="fas fa-key me-2"></i>Change Password
                </button>
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" id="twoFactor">
                    <label class="form-check-label" for="twoFactor">
                        <strong>Two-Factor Authentication</strong>
                        <p class="text-muted mb-0 small">Add an extra layer of security (Coming Soon)</p>
                    </label>
                </div>
            </div>
        </div>

        <!-- Danger Zone -->
        <div class="card border-danger mb-4">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0"><i class="fas fa-exclamation-triangle me-2"></i>Danger Zone</h5>
            </div>
            <div class="card-body">
                <p class="text-muted">Once you delete your account, there is no going back. Please be certain.</p>
                <button class="btn btn-danger" onclick="confirmDelete()">
                    <i class="fas fa-trash me-2"></i>Delete Account
                </button>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="customer-dashboard.html" class="nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="customer-bookings.html" class="nav-item">
            <i class="fas fa-calendar"></i>
            <span>Bookings</span>
        </a>
        <a href="customer-favorites.html" class="nav-item">
            <i class="fas fa-heart"></i>
            <span>Favorites</span>
        </a>
        <a href="customer-history.html" class="nav-item">
            <i class="fas fa-history"></i>
            <span>History</span>
        </a>
        <a href="profile-settings.html" class="nav-item active">
            <i class="fas fa-user"></i>
            <span>Profile</span>
        </a>
    </nav>

    <!-- Change Password Modal -->
    <div class="modal fade" id="changePasswordModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Change Password</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="passwordForm">
                        <div class="mb-3">
                            <label class="form-label">New Password</label>
                            <input type="password" class="form-control" id="newPassword" required minlength="8">
                            <small class="text-muted">Minimum 8 characters</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Confirm New Password</label>
                            <input type="password" class="form-control" id="confirmPassword" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="changePassword()">Change Password</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth-core.js"></script>
    <script>window.protectPage();</script>
    <script src="js/main.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/ai-chatbot.js"></script>
    <script>
        // Load user data on page load
        document.addEventListener('DOMContentLoaded', async () => {
            await loadUserProfile();
        });

        // Load user profile from Supabase
        async function loadUserProfile() {
            try {
                const userData = JSON.parse(localStorage.getItem('userData') || '{}');
                
                // Populate form fields
                document.getElementById('fullName').value = userData.fullName || '';
                document.getElementById('email').value = userData.email || '';
                document.getElementById('phone').value = userData.phone || '';
                document.getElementById('location').value = userData.location || '';
                document.getElementById('bio').value = userData.bio || '';
                
                // Load avatar if exists
                if (userData.avatar) {
                    const avatarPreview = document.getElementById('avatarPreview');
                    avatarPreview.innerHTML = `<img src="${userData.avatar}" class="avatar-preview" alt="Avatar">`;
                }
                
                // Load preferences
                const prefs = userData.preferences || {};
                document.getElementById('emailNotifications').checked = prefs.emailNotifications !== false;
                document.getElementById('smsNotifications').checked = prefs.smsNotifications !== false;
                document.getElementById('pushNotifications').checked = prefs.pushNotifications !== false;
                document.getElementById('marketingEmails').checked = prefs.marketingEmails === true;
                
            } catch (error) {
                console.error('Error loading profile:', error);
                showToast('Error loading profile', 'danger');
            }
        }

        // Handle profile form submission
        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Saving...';
            
            try {
                const userData = JSON.parse(localStorage.getItem('userData') || '{}');
                
                // Update user data
                userData.fullName = document.getElementById('fullName').value;
                userData.phone = document.getElementById('phone').value;
                userData.location = document.getElementById('location').value;
                userData.bio = document.getElementById('bio').value;
                
                // Update in Supabase
                if (window.supabaseClient && userData.id) {
                    const { error } = await window.supabaseClient
                        .from('profiles')
                        .update({
                            full_name: userData.fullName,
                            phone: userData.phone,
                            location: userData.location,
                            bio: userData.bio,
                            updated_at: new Date().toISOString()
                        })
                        .eq('id', userData.id);
                    
                    if (error) throw error;
                }
                
                // Save to localStorage
                localStorage.setItem('userData', JSON.stringify(userData));
                
                showToast('Profile updated successfully!', 'success');
            } catch (error) {
                console.error('Error saving profile:', error);
                showToast('Error saving profile: ' + error.message, 'danger');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
            }
        });

        // Handle avatar upload
        document.getElementById('avatarInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            // Validate file size (max 2MB)
            if (file.size > 2 * 1024 * 1024) {
                showToast('Image must be less than 2MB', 'danger');
                return;
            }
            
            // Preview image
            const reader = new FileReader();
            reader.onload = (e) => {
                const avatarPreview = document.getElementById('avatarPreview');
                avatarPreview.innerHTML = `<img src="${e.target.result}" class="avatar-preview" alt="Avatar">`;
            };
            reader.readAsDataURL(file);
            
            // TODO: Upload to Supabase Storage when configured
            showToast('Avatar preview updated. Full upload coming soon!', 'info');
        });

        // Save preferences
        async function savePreferences() {
            try {
                const userData = JSON.parse(localStorage.getItem('userData') || '{}');
                
                userData.preferences = {
                    emailNotifications: document.getElementById('emailNotifications').checked,
                    smsNotifications: document.getElementById('smsNotifications').checked,
                    pushNotifications: document.getElementById('pushNotifications').checked,
                    marketingEmails: document.getElementById('marketingEmails').checked
                };
                
                // Update in Supabase
                if (window.supabaseClient && userData.id) {
                    const { error } = await window.supabaseClient
                        .from('profiles')
                        .update({
                            preferences: userData.preferences,
                            updated_at: new Date().toISOString()
                        })
                        .eq('id', userData.id);
                    
                    if (error) throw error;
                }
                
                localStorage.setItem('userData', JSON.stringify(userData));
                showToast('Preferences saved successfully!', 'success');
            } catch (error) {
                console.error('Error saving preferences:', error);
                showToast('Error saving preferences: ' + error.message, 'danger');
            }
        }

        // Change password
        async function changePassword() {
            const newPass = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            
            if (newPass !== confirm) {
                showToast('Passwords do not match!', 'danger');
                return;
            }
            
            if (newPass.length < 8) {
                showToast('Password must be at least 8 characters', 'danger');
                return;
            }
            
            try {
                if (!window.supabaseClient) {
                    throw new Error('Supabase not configured');
                }
                
                const { error } = await window.supabaseClient.auth.updateUser({
                    password: newPass
                });
                
                if (error) throw error;
                
                showToast('Password changed successfully!', 'success');
                bootstrap.Modal.getInstance(document.getElementById('changePasswordModal')).hide();
                document.getElementById('passwordForm').reset();
            } catch (error) {
                console.error('Error changing password:', error);
                showToast('Error changing password: ' + error.message, 'danger');
            }
        }

        // Confirm account deletion
        async function confirmDelete() {
            if (!confirm('Are you sure you want to delete your account? This action cannot be undone.')) {
                return;
            }
            
            if (!confirm('This will permanently delete all your data. Are you absolutely sure?')) {
                return;
            }
            
            try {
                const userData = JSON.parse(localStorage.getItem('userData') || '{}');
                
                // Delete from Supabase
                if (window.supabaseClient && userData.id) {
                    const { error } = await window.supabaseClient
                        .from('profiles')
                        .delete()
                        .eq('id', userData.id);
                    
                    if (error) throw error;
                }
                
                // Sign out
                await window.supabaseAuth.logout();
                
                // Clear all data
                localStorage.clear();
                sessionStorage.clear();
                
                window.location.href = 'index.html';
            } catch (error) {
                console.error('Error deleting account:', error);
                showToast('Error deleting account: ' + error.message, 'danger');
            }
        }

        // Go back to appropriate dashboard
        function goBackToDashboard() {
            const userData = JSON.parse(localStorage.getItem('userData') || '{}');
            const role = userData.role || 'customer';
            
            if (role === 'admin') {
                window.location.href = 'admin-dashboard.html';
            } else if (role === 'braider') {
                window.location.href = 'braider-dashboard.html';
            } else {
                window.location.href = 'customer-dashboard.html';
            }
        }

        // Toast notification
        function showToast(message, type = 'info') {
            const toastContainer = document.getElementById('toastContainer') || createToastContainer();
            
            const toast = document.createElement('div');
            toast.className = `toast align-items-center text-white bg-${type} border-0`;
            toast.setAttribute('role', 'alert');
            toast.innerHTML = `
                <div class="d-flex">
                    <div class="toast-body">${message}</div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                </div>
            `;
            
            toastContainer.appendChild(toast);
            const bsToast = new bootstrap.Toast(toast);
            bsToast.show();
            
            toast.addEventListener('hidden.bs.toast', () => {
                toast.remove();
            });
        }

        function createToastContainer() {
            const container = document.createElement('div');
            container.id = 'toastContainer';
            container.className = 'toast-container position-fixed top-0 end-0 p-3';
            container.style.zIndex = '9999';
            document.body.appendChild(container);
            return container;
        }
    </script>
</body>
</html>
